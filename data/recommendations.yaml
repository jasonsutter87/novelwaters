# Novel Waters — the growing shelf
- title: "The Sea Around Us"
  author: "Rachel Carson"
  note: "The book that taught a generation to read the ocean as a living system. Carson writes science like a psalm."
- title: "The Outrun"
  author: "Amy Liptrot"
  note: "Recovery, wild swimming, and the weather of Orkney. Proof that the sea can be a place you come back from."
- title: "The Soul of an Octopus"
  author: "Sy Montgomery"
  note: "A tender, astonishing argument for the inner lives of creatures we barely understand."
- title: "Other Minds"
  author: "Peter Godfrey-Smith"
  note: "Cephalopods as the closest thing to meeting an intelligent alien — without leaving the tide line."
- title: "The Sea Inside"
  author: "Philip Hoare"
  note: "Part natural history, part reverie. Nobody writes the grey Atlantic light quite like Hoare."
- title: "Spineless"
  author: "Juli Berwald"
  note: "Jellyfish, climate, and a scientist finding her way back to wonder. Quietly essential."
